name: Nyaa Watch

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install feedparser
      - env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python scripts/nyaa_watch.py
      - run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add seen.json
          git diff --staged --quiet || git commit -m "update seen"
          git push
